name: build

on:
  push:
    branches: [main]
    tags: ['session-*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile
        run: ./mvnw -B -q compile

      - name: Test
        run: ./mvnw -B -q test

      - name: Verify package
        run: ./mvnw -B -q package -DskipTests
